name: Update HSR Data

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run update script
        run: node scripts/update-hsr-data.mjs

      - name: Format generated files
        run: npm run format

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-hsr-data-$(date -u +%Y%m%d)"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: update HSR character and relic data"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update HSR character and relic data" \
            --body "Automated weekly update of HSR character list, relic set metadata, and image assets from [StarRailRes](https://github.com/Mar-7th/StarRailRes)." \
            --base main \
            --head "$BRANCH"
